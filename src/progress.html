<!doctype html>
<html lang="en">
	<head>
		<script
			async
			src="https://www.googletagmanager.com/gtag/js?id=G-V3EVS49T8Y"
		></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag("js", new Date());

			gtag("config", "G-V3EVS49T8Y");
		</script>

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cat Math</title>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./favicon-32x32.png"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>

		<style>
			@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

			* {
				box-sizing: border-box;
			}

			body {
				font-family:
					"Inter",
					-apple-system,
					BlinkMacSystemFont,
					"Segoe UI",
					Roboto,
					sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				background-attachment: fixed;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				padding: 20px;
				position: relative;
				overflow-x: hidden;
			}

			.container {
				background: rgba(255, 255, 255, 0.95);
				backdrop-filter: blur(20px);
				-webkit-backdrop-filter: blur(20px);
				padding: 30px;
				border-radius: 24px;
				box-shadow:
					0 25px 50px -12px rgba(0, 0, 0, 0.25),
					0 0 0 1px rgba(255, 255, 255, 0.1);
				text-align: center;
				width: 100%;
				max-width: 800px;
				position: relative;
				border: 1px solid rgba(255, 255, 255, 0.2);
				animation: slideIn 0.6s ease-out;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(30px) scale(0.95);
				}

				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			h1 {
				color: #1a1a1a;
				margin-bottom: 30px;
				font-size: 2.5rem;
				font-weight: 700;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
				letter-spacing: -0.02em;
			}

			.brain-emoji {
				background: linear-gradient(
					135deg,
					#ff6b6b 0%,
					#feca57 25%,
					#48dbfb 50%,
					#0abde3 75%,
					#ff9ff3 100%
				);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				display: inline-block;
				animation: brainPulse 2s ease-in-out infinite;
				text-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
			}

			@keyframes brainPulse {
				0%,
				100% {
					transform: scale(1);
					filter: brightness(1);
				}

				50% {
					transform: scale(1.1);
					filter: brightness(1.1);
				}
			}

			button {
				padding: 14px 28px;
				font-size: 1.1em;
				font-weight: 600;
				border: none;
				border-radius: 12px;
				cursor: pointer;
				color: white;
				transition: all 0.3s ease;
				position: relative;
				overflow: hidden;
				letter-spacing: 0.5px;
				text-transform: uppercase;
				font-size: 0.9em;
			}

			button::before {
				content: "";
				position: absolute;
				top: 0;
				left: -100%;
				width: 100%;
				height: 100%;
				background: linear-gradient(
					90deg,
					transparent,
					rgba(255, 255, 255, 0.2),
					transparent
				);
				transition: left 0.5s;
			}

			button:hover::before {
				left: 100%;
			}

			.back-btn {
				background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
				box-shadow: 0 8px 25px rgba(74, 85, 104, 0.3);
				margin-bottom: 25px;
			}

			.back-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 12px 35px rgba(74, 85, 104, 0.4);
			}

			.back-btn:active {
				transform: translateY(0);
			}

			/* Overall summary */
			.overall-summary {
				margin-bottom: 30px;
				padding: 25px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				border-radius: 16px;
				color: white;
				box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
			}

			.overall-summary h2 {
				margin: 0 0 15px 0;
				font-size: 1.3em;
				font-weight: 700;
			}

			.summary-stats {
				display: flex;
				justify-content: center;
				gap: 30px;
				flex-wrap: wrap;
			}

			.summary-stat {
				text-align: center;
			}

			.summary-stat .stat-value {
				font-size: 2em;
				font-weight: 700;
				display: block;
			}

			.summary-stat .stat-label {
				font-size: 0.85em;
				opacity: 0.9;
				font-weight: 500;
			}

			/* Progress groups */
			.progress-section {
				text-align: left;
			}

			.progress-group {
				margin-bottom: 16px;
				border-radius: 12px;
				overflow: hidden;
				background: rgba(255, 255, 255, 0.5);
				border: 1px solid rgba(0, 0, 0, 0.05);
			}

			.progress-group summary {
				padding: 12px 20px;
				font-size: 0.9em;
				font-weight: 700;
				color: #2d3748;
				text-align: left;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				cursor: pointer;
				user-select: none;
				background: rgba(255, 255, 255, 0.8);
				transition: background 0.2s ease;
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.progress-group summary:hover {
				background: rgba(255, 255, 255, 1);
			}

			.progress-group[open] summary {
				border-bottom: 1px solid rgba(0, 0, 0, 0.05);
			}

			.progress-group summary::marker {
				color: #667eea;
			}

			.group-summary {
				margin-left: auto;
				font-size: 0.85em;
				font-weight: 600;
				color: #667eea;
			}

			.progress-items {
				padding: 15px;
			}

			.progress-item {
				margin-bottom: 14px;
			}

			.progress-item:last-child {
				margin-bottom: 0;
			}

			.progress-label {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 6px;
			}

			.progress-label .category-name {
				font-size: 0.85em;
				font-weight: 600;
				color: #2d3748;
			}

			.progress-label .progress-count {
				font-size: 0.8em;
				font-weight: 500;
				color: #718096;
			}

			.progress-bar-bg {
				width: 100%;
				height: 10px;
				background: #e2e8f0;
				border-radius: 5px;
				overflow: hidden;
			}

			.progress-bar-fill {
				height: 100%;
				border-radius: 5px;
				transition: width 0.6s ease;
				min-width: 0;
			}

			.progress-bar-fill.low {
				background: linear-gradient(90deg, #fc8181, #f56565);
			}

			.progress-bar-fill.medium {
				background: linear-gradient(90deg, #f6e05e, #ecc94b);
			}

			.progress-bar-fill.high {
				background: linear-gradient(90deg, #68d391, #48bb78);
			}

			.progress-bar-fill.complete {
				background: linear-gradient(90deg, #667eea, #764ba2);
			}

			/* Footer */
			.footer {
				margin-top: 30px;
				padding-top: 20px;
				border-top: 1px solid rgba(0, 0, 0, 0.05);
				font-size: 0.8em;
				color: #718096;
				display: flex;
				justify-content: center;
				gap: 15px;
				align-items: center;
			}

			.footer a {
				color: #667eea;
				text-decoration: none;
				font-weight: 500;
				transition: all 0.2s ease;
			}

			.footer a:hover {
				color: #764ba2;
				text-decoration: underline;
			}

			/* Focus states for accessibility */
			button:focus {
				outline: 2px solid #667eea;
				outline-offset: 2px;
			}

			/* Responsive design */
			@media (max-width: 600px) {
				.container {
					padding: 30px 20px;
					margin: 10px;
				}

				h1 {
					font-size: 2rem;
				}

				.summary-stats {
					gap: 20px;
				}

				.summary-stat .stat-value {
					font-size: 1.6em;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1 data-i18n="title">
				Cat Math <span class="brain-emoji">&#x1F408;&#x200D;&#x2B1B;</span>
			</h1>

			<button
				id="back-btn"
				class="back-btn"
				data-i18n="back_to_categories"
			>
				&larr; Back to Categories
			</button>

			<div class="overall-summary" id="overall-summary">
				<h2 data-i18n="progress_title">Your Progress</h2>
				<div class="summary-stats">
					<div class="summary-stat">
						<span class="stat-value" id="total-solved">0</span>
						<span class="stat-label" data-i18n="progress_solved"
							>Problems Solved</span
						>
					</div>
					<div class="summary-stat">
						<span class="stat-value" id="total-available">0</span>
						<span
							class="stat-label"
							data-i18n="progress_total"
							>Total Problems</span
						>
					</div>
					<div class="summary-stat">
						<span class="stat-value" id="overall-percent"
							>0%</span
						>
						<span
							class="stat-label"
							data-i18n="progress_complete"
							>Complete</span
						>
					</div>
					<div class="summary-stat">
						<span
							class="stat-value"
							id="categories-mastered"
							>0</span
						>
						<span
							class="stat-label"
							data-i18n="progress_mastered"
							>Mastered</span
						>
					</div>
				</div>
			</div>

			<div class="progress-section" id="progress-groups"></div>

			<div class="footer">
				<span
					><a href="mailto:damjan.kosir@gmail.com"
						>Damjan Ko&scaron;ir</a
					></span
				>
				<span>&bull;</span>
				<a
					href="https://github.com/Null000/cat-math"
					target="_blank"
					rel="noopener noreferrer"
				>
					<i class="fa-brands fa-github"></i>
				</a>
			</div>
		</div>

		<script type="module" src="./progress.js"></script>
	</body>
</html>
